services:

  frontend:
    image: damon1974/rustmon-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rustmon-net

  backend:
    image: damon1974/rustmon-backend:latest
    ports:
      - "3001:3000"
    depends_on:
      - redis
    environment:
      STEAM_API: ${STEAM_API:-changeme}
      CACHE_HOST: redis
      CACHE_PORT: 6379
      CACHE_AUTH: ${REDIS_PASSWORD:-rustmon}
      CACHE_TTL: 604800
    restart: unless-stopped
    networks:
      - rustmon-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-rustmon}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - rustmon-net

volumes:
  redis-data:

networks:
  rustmon-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
