services:

  frontend:
    build:
      context: ./rustmon
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./user-data-srv
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - redis
    environment:
      STEAM_API: ${STEAM_API:-changeme}
      CACHE_HOST: redis
      CACHE_PORT: 6379
      CACHE_AUTH: ${REDIS_PASSWORD:-rustmon}
      CACHE_TTL: 604800
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-rustmon}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
